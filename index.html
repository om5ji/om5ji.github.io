<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmTech Global | Remote Tech Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="p-6 flex justify-between items-center border-b border-gray-800">
        <h1 class="text-2xl font-bold text-blue-500">OmTech<span class="text-white">Global</span></h1>
        <div class="hidden md:block space-x-6 text-gray-300">
            <span>OS Errors</span> • <span>Performance</span> • <span>Linux Expert</span>
        </div>
    </nav>

    <header class="py-16 text-center px-4">
        <h2 class="text-4xl md:text-6xl font-extrabold mb-4 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
            Global Tech Support from Ballia
        </h2>
        <p class="text-lg text-gray-400 max-w-2xl mx-auto">
            Windows BSOD, Linux Boot Loop, या Slow PC? मैं दुनिया के किसी भी कोने से आपका डिवाइस ठीक कर सकता हूँ।
        </p>
    </header>

    <section class="pb-16 px-6">
        <div class="max-w-md mx-auto bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
            <h3 class="text-xl font-bold mb-6 text-center text-blue-400">अपनी समस्या यहाँ विस्तार से लिखें</h3>
            <textarea id="issue" rows="4" placeholder="उदाहरण: My Linux Mint is not booting after update..." 
                class="w-full p-4 mb-6 bg-gray-900 rounded-xl text-white border border-gray-700 outline-none focus:ring-2 focus:ring-blue-500 transition"></textarea>
            
            <button onclick="sendToWA()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold text-lg transition-all transform hover:scale-105 shadow-lg">
                WhatsApp पर मैसेज भेजें
            </button>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-600 border-t border-gray-800">
        <p>© 2026 OmTech Global | Solution for every Software Problem</p>
    </footer>

    <script>
    function sendToWA() {
        let issue = document.getElementById('issue').value;
        if(issue.trim() === "") {
            alert("कृपया पहले अपनी समस्या लिखें!");
            return;
        }
        // यहाँ YOUR_NUMBER की जगह अपना मोबाइल नंबर डालें (जैसे: 919876543210)
        let myNumber = "918112665753"; 
        let url = "https://wa.me/" + myNumber + "?text=" + encodeURIComponent("Hi Om, I saw your website. I need help with: " + issue);
        window.open(url, '_blank');
    }
    </script>

</body>
</html>
